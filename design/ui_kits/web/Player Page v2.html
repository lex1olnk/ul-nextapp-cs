/* ══════════ GLOBE ══════════ */
function Globe({ size = 680 }) {
  const ref = useRef(null);
  const ang = useRef(0);
  const raf = useRef(null);
  useEffect(() => {
    const cv = ref.current; if (!cv) return;
    const ctx = cv.getContext('2d');
    const W = cv.width, H = cv.height, cx = W/2, cy = H/2, r = Math.min(W,H)*.44;
    function proj(lat, lng, a) {
      const phi = (90-lat)*Math.PI/180, th = (lng+a)*Math.PI/180;
      return { x: cx+r*Math.sin(phi)*Math.cos(th), y: cy-r*Math.cos(phi), z: Math.sin(phi)*Math.sin(th) };
    }
    function arc(pts, col, lw) {
      ctx.strokeStyle = col; ctx.lineWidth = lw;
      let on = false; ctx.beginPath();
      pts.forEach(p => {
        if (p.z > -0.05) { on ? ctx.lineTo(p.x,p.y) : (ctx.moveTo(p.x,p.y), on=true); }
        else { if (on) { ctx.stroke(); ctx.beginPath(); on = false; } }
      });
      if (on) ctx.stroke();
    }
    function draw() {
      const a = ang.current;
      ctx.clearRect(0,0,W,H);
      const dim = 'rgba(155,155,155,0.09)';
      for (let lat=-80; lat<=80; lat+=20) {
        const pts=[]; for(let lng=0;lng<=361;lng+=2) pts.push(proj(lat,lng,a));
        arc(pts, lat===0?'rgba(155,155,155,0.2)':dim, lat===0?1:.5);
      }
      for (let lng=0; lng<360; lng+=20) {
        const pts=[]; for(let lat=-90;lat<=90;lat+=2) pts.push(proj(lat,lng,a));
        arc(pts, dim, .5);
      }
      ctx.beginPath(); ctx.arc(cx,cy,r,0,Math.PI*2);
      ctx.strokeStyle='rgba(155,155,155,0.13)'; ctx.lineWidth=1; ctx.stroke();
      CITIES.forEach(c => {
        const p = proj(c.lat,c.lng,a);
        if (p.z>.1) {
          ctx.beginPath(); ctx.arc(p.x,p.y,7,0,Math.PI*2);
          ctx.fillStyle='rgba(192,82,42,.16)'; ctx.fill();
          ctx.beginPath(); ctx.arc(p.x,p.y,2.5,0,Math.PI*2);
          ctx.fillStyle='#c0522a'; ctx.fill();
        }
      });
    }
    const step = () => { ang.current += .055; draw(); raf.current = requestAnimationFrame(step); };
    step();
    return () => cancelAnimationFrame(raf.current);
  }, []);
  return <canvas ref={ref} width={size} height={size} style={{ display:'block' }}/>;
}

/* ══════════ XXX MARK ══════════ */
function XxxMark({ h = 188 }) {
  const marks = [{ s:1,y:0 }, { s:.82,y:58 }, { s:.65,y:108 }];
  return (
    <svg width={h*.56} height={h} viewBox="0 0 66 188" fill="none">
      {marks.map((m, i) => {
        const cx=33, cy=m.y+28, a=19*m.s, d=7*m.s, sw=2.5*m.s;
        return (
          <g key={i}>
            <line x1={cx-a} y1={cy-a} x2={cx+a} y2={cy+a} stroke="#fff" strokeWidth={sw}/>
            <line x1={cx+a} y1={cy-a} x2={cx-a} y2={cy+a} stroke="#fff" strokeWidth={sw}/>
            <rect x={cx-d} y={cy-d} width={d*2} height={d*2}
              transform={`rotate(45,${cx},${cy})`} fill="none" stroke="#fff" strokeWidth={sw*.55}/>
          </g>
        );
      })}
    </svg>
  );
}

/* ══════════ PRIMITIVES ══════════ */
function Fade({ children, delay=0, style, className='' }) {
  const ref = useRef(null);
  useEffect(() => {
    const el = ref.current;
    const t = setTimeout(() => el && el.classList.add('in'), 60+delay);
    return () => clearTimeout(t);
  }, []);
  return <div ref={ref} className={'fade '+className} style={style}>{children}</div>;
}
function Bar({ value, accent }) {
  const [w, setW] = useState(0);
  useEffect(() => { setW(0); const t = setTimeout(() => setW(value*100), 300); return () => clearTimeout(t); }, [value]);
  return <div className="bt"><div className="bf" style={{ width:w+'%', background:accent||undefined }}/></div>;
}

/* ══════════ STAT STRIP ══════════ */
function StatStrip({ p }) {
  const stats = [
    { cap:"RATING_2.1",  val:p.rating.toFixed(2), pct:(p.rating-.5)/.9,  accent:'#c0522a', trend:"+0.12↑" },
    { cap:"AVG_DMG_RND", val:p.adr.toFixed(1),    pct:p.adr/130,          accent:null,      trend:"+4.3↑"  },
    { cap:"KAST%",       val:p.kast+"%",           pct:p.kast/100,         accent:null,      trend:"+2%↑"   },
    { cap:"HS%",         val:p.hs+"%",             pct:p.hs/100,           accent:null,      trend:"−3%↓"   },
    { cap:"K/D",         val:p.kd.toFixed(2),      pct:(p.kd-.5)/1.2,     accent:null,      trend:"+0.08↑" },
  ];
  return (
    <div style={{ display:'grid', gridTemplateColumns:'repeat(5,1fr)',
      borderTop:'1px solid var(--z900)', borderLeft:'1px solid var(--z900)' }}>
      {stats.map((s,i) => (
        <Fade key={i} delay={i*55}>
          <div style={{ padding:'22px 20px 18px', borderRight:'1px solid var(--z900)', borderBottom:'1px solid var(--z900)' }}>
            <div className="cap" style={{ fontSize:7, letterSpacing:'.26em' }}>{s.cap}</div>
            <div className="num" style={{ fontSize:'clamp(26px,2.5vw,38px)', color:s.accent||'#fff', margin:'10px 0 9px' }}>
              {s.val}
            </div>
            <Bar value={s.pct} accent={s.accent}/>
            <div style={{ fontFamily:'var(--mono)', fontSize:8, letterSpacing:'.1em', marginTop:7,
              color:s.trend.includes('↓')?'var(--red)':'var(--green)' }}>{s.trend} vs avg</div>
          </div>
        </Fade>
      ))}
    </div>
  );
}

      <svg style={{ position:'absolute', inset:0, width:'100%', height:'100%' }}>
        {/* left-to-junction */}
        <line x1="22%" y1="27%" x2="41%" y2="50%" stroke="rgba(255,255,255,.13)" strokeWidth="1.2" strokeDasharray="4 3"/>
        <line x1="22%" y1="73%" x2="41%" y2="50%" stroke="rgba(255,255,255,.13)" strokeWidth="1.2" strokeDasharray="4 3"/>
        {/* central line */}
        <line x1="41%" y1="50%" x2="59%" y2="50%" stroke="rgba(255,255,255,.22)" strokeWidth="1.5"/>
        {/* junction-to-right */}
        <line x1="59%" y1="50%" x2="78%" y2="27%" stroke="rgba(255,255,255,.13)" strokeWidth="1.2" strokeDasharray="4 3"/>
        <line x1="59%" y1="50%" x2="78%" y2="73%" stroke="rgba(255,255,255,.13)" strokeWidth="1.2" strokeDasharray="4 3"/>
        {/* junction nodes */}
        <circle cx="41%" cy="50%" r="4" fill="rgba(255,255,255,.28)"/>
        <circle cx="59%" cy="50%" r="4" fill="rgba(255,255,255,.28)"/>
        {/* central orange node */}
        <circle cx="50%" cy="50%" r="5.5" fill="#c0522a"/>
        <circle cx="50%" cy="50%" r="12"  fill="rgba(192,82,42,.16)"/>
        {/* endpoint dots */}
        {['22% 27%','22% 73%','78% 27%','78% 73%'].map((xy,i) => {
          const [x,y] = xy.split(' ');
          return <circle key={i} cx={x} cy={y} r="2.5" fill="rgba(255,255,255,.22)"/>;
        })}
      </svg>
      {/* Left weapon boxes */}
      {weapons.slice(0,2).map((w,i) => (
        <div key={w.name} style={{ position:'absolute', left:'2%', top:i===0?'11%':'58%',
          width:168, background:'rgba(14,14,16,.96)', border:'1px solid rgba(255,255,255,.08)', padding:'12px 14px' }}>
          <div className="cap" style={{ fontSize:7, letterSpacing:'.22em', display:'block', marginBottom:8 }}>{w.name}</div>
          <div style={{ display:'flex', gap:16 }}>
            {[['K',''+w.kills],['ADR',''+w.adr],['HS',w.hs+'%'],['OPEN',w.openK+'%']].map(([l,v]) => (
              <div key={l}>
                <div style={{ fontFamily:'var(--mono)', fontSize:6, color:'var(--z600)', letterSpacing:'.12em', marginBottom:3 }}>{l}</div>
                <div className="num" style={{ fontSize:15 }}>{v}</div>
              </div>
            ))}
          </div>
        </div>
      ))}
      {/* Right weapon boxes */}
      {weapons.slice(2,4).map((w,i) => (
        <div key={w.name} style={{ position:'absolute', right:'2%', top:i===0?'11%':'58%',
          width:168, background:'rgba(14,14,16,.96)', border:'1px solid rgba(255,255,255,.08)', padding:'12px 14px' }}>
          <div className="cap" style={{ fontSize:7, letterSpacing:'.22em', display:'block', marginBottom:8 }}>{w.name}</div>
          <div style={{ display:'flex', gap:16 }}>
            {[['K',''+w.kills],['ADR',''+w.adr],['HS',w.hs+'%'],['OPEN',w.openK+'%']].map(([l,v]) => (
              <div key={l}>
                <div style={{ fontFamily:'var(--mono)', fontSize:6, color:'var(--z600)', letterSpacing:'.12em', marginBottom:3 }}>{l}</div>
                <div className="num" style={{ fontSize:15 }}>{v}</div>
              </div>
            ))}
          </div>
        </div>
      ))}
    </div>
  );
}

/* ══════════ CLUTCH + GAUGE ══════════ */
function ClutchGauge({ p }) {
  const total = p.clutchW + p.clutchL;
  const [barW, setBarW] = useState(0);
  const [gPct, setGPct]  = useState(0);
  useEffect(() => {
    setBarW(0); setGPct(0);
    const t = setTimeout(() => { setBarW(p.clutchW/total*100); setGPct(p.entry/100); }, 300);
    return () => clearTimeout(t);
  }, [p]);
  const sz=172, r=sz/2-8, c=2*Math.PI*r, off=c-c*gPct;
  return (
    <div style={{ display:'grid', gridTemplateColumns:'1fr 248px', border:'1px solid var(--z900)' }}>
      <div style={{ padding:'28px', borderRight:'1px solid var(--z900)' }}>
        {/* Clutch bar */}
        <div style={{ height:44, display:'flex', overflow:'hidden', border:'1px solid var(--z900)', marginBottom:10 }}>
          <div style={{ width:barW+'%', background:'#fff', color:'#000', display:'flex', alignItems:'center',
            padding:'0 16px', fontWeight:900, fontStyle:'italic', fontSize:14, whiteSpace:'nowrap',
            transition:'width 1.2s cubic-bezier(0,.6,.3,1)' }}>WON {p.clutchW}</div>
          <div style={{ flex:1, background:'var(--z900)', color:'var(--z500)', display:'flex', alignItems:'center',
            justifyContent:'flex-end', padding:'0 16px', fontWeight:900, fontStyle:'italic', fontSize:14 }}>
            {p.clutchL} LOST</div>
        </div>
        <div style={{ display:'flex', justifyContent:'space-between', fontFamily:'var(--mono)', fontSize:8,
          letterSpacing:'.1em', textTransform:'uppercase', marginBottom:24 }}>
          <span style={{ color:'var(--green)' }}>WIN_RATE {Math.round(p.clutchW/total*100)}%</span>
          <span style={{ color:'var(--z500)' }}>TOTAL {total}</span>
        </div>
        {/* Mini stats */}
        <div style={{ display:'grid', gridTemplateColumns:'repeat(3,1fr)', gap:8 }}>
          {[['MAPS',''+p.maps],['ENTRY%',p.entry+'%'],['AVG_ADR',p.adr.toFixed(0)]].map(([l,v]) => (
            <div key={l} style={{ padding:'10px 12px', background:'rgba(20,20,22,.9)', border:'1px solid var(--z900)' }}>
              <div className="cap" style={{ fontSize:7, display:'block', marginBottom:5 }}>{l}</div>
              <div className="num" style={{ fontSize:22 }}>{v}</div>
            </div>
          ))}
        </div>
      </div>
      {/* Gauge */}
      <div style={{ display:'flex', flexDirection:'column', alignItems:'center', justifyContent:'center', padding:28, gap:10 }}>
        <div className="cap" style={{ fontSize:7, alignSelf:'flex-start', letterSpacing:'.24em' }}>// ENTRY_KILL_RATE</div>
        <div style={{ position:'relative', width:sz, height:sz }}>
          <svg width={sz} height={sz} style={{ transform:'rotate(-90deg)' }}>
            <circle cx={sz/2} cy={sz/2} r={r} fill="none" stroke="var(--z900)" strokeWidth="3"/>
            <circle cx={sz/2} cy={sz/2} r={r} fill="none" stroke="#fff" strokeWidth="4"
              strokeDasharray={c} strokeDashoffset={off}
              style={{ transition:'stroke-dashoffset 1.6s cubic-bezier(0,.6,.3,1)' }}/>
          </svg>
          <div style={{ position:'absolute', top:'50%', left:'50%', transform:'translate(-50%,-50%)', textAlign:'center' }}>
            <div className="num" style={{ fontSize:38, lineHeight:1 }}>
              {Math.round(gPct*100)}<span style={{ fontSize:16, color:'var(--z500)', fontStyle:'normal' }}>%</span>
            </div>
            <div className="cap" style={{ fontSize:6, display:'block', marginTop:5, letterSpacing:'.2em' }}>KILLS_TOTAL</div>
          </div>
        </div>
      </div>
    </div>
  );
}

/* ══════════ PLAYER VS PLAYER ══════════ */
function PvP({ pvp }) {
  const { me, them } = pvp;
  const cats = [
    { label:'Kills',    a:me.kills, b:them.kills },
    { label:'Tag',      a:me.tag,   b:them.tag   },
    { label:'2 Picks',  a:me.p2,    b:them.p2    },
    { label:'3 Picks',  a:me.p3,    b:them.p3    },
    { label:'4 Picks',  a:me.p4,    b:them.p4    },
  ];
  return (
    <div>
      <div style={{ display:'grid', gridTemplateColumns:'1fr 140px 1fr', paddingBottom:14,
        borderBottom:'1px solid var(--z900)', marginBottom:4 }}>
        <div>
          <div className="num" style={{ fontSize:'clamp(18px,2vw,26px)' }}>{me.name}</div>
          <div className="cap" style={{ fontSize:7, marginTop:6, color:'var(--orange)', letterSpacing:'.2em' }}>YOU</div>
        </div>
        <div style={{ display:'flex', alignItems:'center', justifyContent:'center' }}>
          <div className="cap" style={{ fontSize:7, letterSpacing:'.2em', color:'var(--z700)' }}>// PvP</div>
        </div>
        <div style={{ textAlign:'right' }}>
          <div className="num" style={{ fontSize:'clamp(18px,2vw,26px)' }}>{them.name}</div>
          <div className="cap" style={{ fontSize:7, marginTop:6, letterSpacing:'.2em' }}>OPPONENT</div>
        </div>
      </div>
      {cats.map((cat,i) => {
        const tot = cat.a+cat.b || 1;
        const pA = cat.a/tot*100, pB = cat.b/tot*100;
        const aW = cat.a >= cat.b;
        return (
          <Fade key={cat.label} delay={i*55}>
            <div style={{ display:'grid', gridTemplateColumns:'1fr 140px 1fr', padding:'11px 0',
              borderBottom:'1px solid var(--z900)', alignItems:'center' }}>
              <div style={{ display:'flex', alignItems:'center', justifyContent:'flex-end', gap:14 }}>
                <div className="num" style={{ fontSize:20, color:aW?'#fff':'var(--z600)' }}>{cat.a}</div>
                <div style={{ width:'55%', height:5, background:'var(--z900)', overflow:'hidden' }}>
                  <div style={{ height:'100%', width:pA+'%', background:aW?'#fff':'var(--z700)',
                    marginLeft:'auto', transition:'width 1.2s cubic-bezier(0,.6,.3,1)' }}/>
                </div>
              </div>
              <div style={{ textAlign:'center' }}>
                <div className="cap" style={{ fontSize:7, letterSpacing:'.18em', color:'var(--z500)' }}>{cat.label}</div>
              </div>
              <div style={{ display:'flex', alignItems:'center', gap:14 }}>
                <div style={{ width:'55%', height:5, background:'var(--z900)', overflow:'hidden' }}>
                  <div style={{ height:'100%', width:pB+'%', background:!aW?'#fff':'var(--z700)',
                    transition:'width 1.2s cubic-bezier(0,.6,.3,1)' }}/>
                </div>
                <div className="num" style={{ fontSize:20, color:!aW?'#fff':'var(--z600)' }}>{cat.b}</div>
              </div>
            </div>
          </Fade>
        );
      })}
    </div>
  );
}

/* ══════════ MATCH HISTORY ══════════ */
function MatchHistory({ matches }) {
  const COLS = '110px 90px 54px 68px 60px 40px 36px';
  const HEADS = ['MAP','OPPONENT','SCORE','RATING','ADR','K','D'];
  return (
    <div>
      <div style={{ display:'grid', gridTemplateColumns:COLS, padding:'8px 16px',
        background:'rgba(20,20,22,.7)', border:'1px solid var(--z900)', borderBottom:'none' }}>
        {HEADS.map(h => (
          <div key={h} className="cap" style={{ padding:'0 6px', fontSize:7, letterSpacing:'.2em' }}>{h}</div>
        ))}
      </div>
      {matches.map((m,i) => (
        <Fade key={i} delay={i*50}>
          <div className="inv" style={{ display:'grid', gridTemplateColumns:COLS, padding:'0 16px',
            minHeight:52, alignItems:'center', border:'1px solid var(--z900)', borderTop:'none', position:'relative' }}>
            <div className="num" style={{ position:'absolute', right:14, fontSize:48,
              color:'var(--z900)', pointerEvents:'none', userSelect:'none', lineHeight:1 }}>
              {String(i+1).padStart(2,'0')}
            </div>
            <div style={{ padding:'0 6px', fontWeight:900, fontStyle:'italic', fontSize:12, letterSpacing:'-.02em' }}>{m.map}</div>
            <div style={{ padding:'0 6px', fontFamily:'var(--mono)', fontSize:8, letterSpacing:'.06em', color:'var(--z400)' }}>{m.opp}</div>
            <div className="num" style={{ padding:'0 6px', fontSize:13, color:m.win?'#fff':'var(--z600)' }}>{m.score}</div>
            <div className="num" style={{ padding:'0 6px', fontSize:17, color:m.rating>=1.3?'#c0522a':'#fff' }}>{m.rating.toFixed(2)}</div>
            <div className="num" style={{ padding:'0 6px', fontSize:13, color:'var(--z400)' }}>{m.adr}</div>
            <div className="num" style={{ padding:'0 6px', fontSize:17 }}>{m.k}</div>
            <div className="num" style={{ padding:'0 6px', fontSize:13, color:'var(--z500)' }}>{m.d}</div>
          </div>
        </Fade>
      ))}
    </div>
  );
}

/* ══════════ APP ══════════ */
function App() {
  const [player, setPlayer] = useState(PLAYERS[0]);
  const [clicks, setClicks] = useState(0);
  const [ver,    setVer]    = useState(0);
  function switchPlayer(p) { setPlayer(p); setVer(v => v+1); setClicks(0); }
  return (
    <div style={{ background:'var(--bg)', minHeight:'100vh' }}>
      <Hero key={'h'+ver} player={player} onSwitch={switchPlayer}
        clicks={clicks} onCardClick={() => setClicks(c => c+1)}/>
      <PlayerHeader key={'ph'+ver} player={player}/>
      <div className="container" style={{ paddingTop:0 }}>
        <StatStrip key={'ss'+ver} p={player}/>
      </div>
      <div className="container sec">
        <SecHd label="// WEAPON_STATISTIC"/>
        <Fade key={'wn'+ver} delay={60}><WeaponNodes weapons={player.weapons}/></Fade>
      </div>
      <div className="container" style={{ paddingBottom:72 }}>
        <SecHd label="// CLUTCH_STATS"/>
        <Fade key={'cg'+ver} delay={80}><ClutchGauge p={player}/></Fade>
      </div>
      <div className="container" style={{ paddingBottom:72 }}>
        <SecHd label="// PLAYER_VS_PLAYER"/>
        <Fade key={'pvp'+ver} delay={100}><PvP pvp={player.pvp}/></Fade>
      </div>
      <div className="container" style={{ paddingBottom:80 }}>
        <SecHd label="// MATCH_HISTORY"/>
        <MatchHistory key={'mh'+ver} matches={player.matches}/>
      </div>
      <div className="container" style={{ paddingBottom:48 }}>
        <div style={{ borderTop:'1px solid var(--z900)', paddingTop:20, display:'flex',
          justifyContent:'space-between', fontFamily:'var(--mono)', fontSize:8,
          letterSpacing:'.2em', textTransform:'uppercase', color:'var(--z700)' }}>
          <span>CS2_PARSER // PLAYER_STATS_MODULE</span>
          <span>{player.node} // NET_OK</span>
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
