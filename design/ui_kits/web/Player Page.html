<html lang="en">
<head>
<meta charset="utf-8">

<title>PLAYER_PROFILE // CS2 Parser Stats</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Nunito:ital,wght@0,400;0,600;0,700;0,800;0,900;1,800;1,900&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --page:#0a0a0a;
  --z900:#18181b;--z800:#27272a;--z700:#3f3f46;--z600:#52525b;--z500:#71717a;--z400:#a1a1aa;
  --orange:#f97316;--green:#22c55e;--yellow:#facc15;--red:#ef4444;
  --sans:"Nunito",ui-sans-serif,system-ui,sans-serif;
  --mono:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;
}
html,body{background:var(--page);color:#fff;font-family:var(--sans);-webkit-font-smoothing:antialiased;overflow-x:hidden}
::selection{background:#fff;color:#000}

/* dot grid */
.dotgrid{position:fixed;inset:0;z-index:0;pointer-events:none;opacity:.13;
  background-image:radial-gradient(#fff 1px,transparent 1px);background-size:50px 50px}

/* navbar */
.navwrap{position:fixed;top:0;left:0;right:0;z-index:50}
.navbar{background:rgba(0,0,0,.84);backdrop-filter:blur(12px);
  border-bottom:1px solid var(--z800);transform:translateY(calc(-100% + 4px));transition:transform .35s}
.navwrap:hover .navbar{transform:translateY(0)}
.navtab{position:absolute;bottom:-1px;left:50%;transform:translateX(-50%);width:48px;height:4px;background:var(--z700)}
.navinner{max-width:1280px;margin:0 auto;padding:14px 48px;display:flex;align-items:center;justify-content:space-between;gap:24}
.navbrand{font-weight:900;font-style:italic;letter-spacing:-.04em;text-transform:uppercase;font-size:18px;cursor:pointer;white-space:nowrap}
.navlinks{display:flex;gap:26px}
.navlink{font-family:var(--mono);font-size:10px;letter-spacing:.25em;text-transform:uppercase;
  color:var(--z500);cursor:pointer;background:none;border:none;transition:color .2s}
.navlink:hover,.navlink.is-active{color:#fff}

/* layout */
.page{padding-top:120px;padding-bottom:120px;min-height:100vh;position:relative;overflow-x:hidden}
.container{max-width:1280px;margin:0 auto;padding:0 48px;position:relative;z-index:1}

/* watermark */
.wm{position:absolute;font-weight:900;font-style:italic;text-transform:uppercase;
  color:rgba(255,255,255,.032);letter-spacing:-.05em;line-height:.8;pointer-events:none;z-index:0;user-select:none}

/* type */
.h1{font-weight:900;font-style:italic;letter-spacing:-.05em;text-transform:uppercase;line-height:.92}
.num{font-weight:900;font-style:italic;letter-spacing:-.05em;font-variant-numeric:tabular-nums}
.cap{font-family:var(--mono);text-transform:uppercase;color:var(--z500);font-weight:700;letter-spacing:.4em;font-size:10px}
.cap-xs{font-size:8px;letter-spacing:.3em}

/* card */
.card{position:relative;border:1px solid var(--z900);background:rgba(24,24,27,.1)}
.ticks::before,.ticks::after{content:"";position:absolute;width:16px;height:16px}
.ticks::before{top:-1px;left:-1px;border-top:1px solid var(--z600);border-left:1px solid var(--z600)}
.ticks::after{bottom:-1px;right:-1px;border-bottom:1px solid var(--z600);border-right:1px solid var(--z600)}

/* chips */
.chip{display:inline-block;background:#fff;color:#000;padding:3px 9px;font-size:10px;font-weight:900;text-transform:uppercase;letter-spacing:.04em}
.badge{display:inline-block;background:#000;border:1px solid var(--z800);color:#fff;padding:2px 7px;font-size:8px;font-weight:700;font-style:italic;text-transform:uppercase}

/* progress bar */
.bt{height:4px;background:var(--z900);overflow:hidden;transition:background .3s}
.bf{height:100%;background:#fff;transition:width 1.2s cubic-bezier(0,.6,.3,1),background .3s}

/* hover inversion */
.inv{transition:background .3s,color .3s;cursor:pointer;overflow:hidden;position:relative}
.inv .wipe{position:absolute;left:0;top:0;height:100%;width:2px;background:#fff;
  transform:scaleY(0);transform-origin:top;transition:transform .3s}
.inv .sub{color:var(--z600);transition:color .3s}
.inv:hover{background:#fff;color:#000}
.inv:hover .wipe{transform:scaleY(1)}
.inv:hover .sub{color:rgba(0,0,0,.45)}
.inv:hover .bf{background:#000}
.inv:hover .bt{background:#e4e4e7}
.inv:hover .ghost-num{color:rgba(0,0,0,.12)}

/* fade */
.fade{opacity:0;transform:translateY(12px);transition:opacity .55s,transform .55s}
.fade.in{opacity:1;transform:none}

/* zebra divider */
.zebra{height:20px;background:repeating-linear-gradient(-45deg,var(--z900),var(--z900) 4px,transparent 4px,transparent 10px);opacity:.4}

/* page header */
.pagehead{border-left:4px solid #fff;padding-left:32px;margin-bottom:52px}
.tagrow{display:flex;align-items:center;gap:16px;margin-bottom:12px;flex-wrap:wrap}
</style>
</head>

/* ─── PRIMITIVES ────────────────────────────────────────────── */
function Fade({ children, delay = 0, style, className = "" }) {
  const ref = useRef(null);
  useEffect(() => {
    const el = ref.current;
    const t = setTimeout(() => el && el.classList.add("in"), 40 + delay);
    return () => clearTimeout(t);
  }, []);
  return <div ref={ref} className={"fade " + className} style={style}>{children}</div>;
}

function Bar({ value, max = 1, accent }) {
  const [w, setW] = useState(0);
  useEffect(() => {
    setW(0);
    const t = setTimeout(() => setW((value / max) * 100), 280);
    return () => clearTimeout(t);
  }, [value, max]);
  return (
    <div className="bt">
      <div className="bf" style={{ width: w + "%", background: accent || undefined }} />
    </div>
  );
}

function Gauge({ value, size = 128 }) {
  const r = size / 2 - 3;
  const c = 2 * Math.PI * r;
  const [off, setOff] = useState(c);
  useEffect(() => {
    setOff(c);
    const t = setTimeout(() => setOff(c - c * value), 400);
    return () => clearTimeout(t);
  }, [value]);
  return (
    <div style={{ position: "relative", width: size, height: size }}>
      <svg width={size} height={size} style={{ transform: "rotate(-90deg)" }}>
        <circle cx={size / 2} cy={size / 2} r={r} fill="none" stroke="#18181b" strokeWidth="2" />
        <circle cx={size / 2} cy={size / 2} r={r} fill="none" stroke="#fff" strokeWidth="3"
          strokeDasharray={c} strokeDashoffset={off}
          style={{ transition: "stroke-dashoffset 1.5s cubic-bezier(0,.6,.3,1)" }} />
      </svg>
      <div className="num" style={{
        position: "absolute", top: "50%", left: "50%",
        transform: "translate(-50%,-50%)", fontSize: size * .2, textAlign: "center", lineHeight: 1,
      }}>
        {Math.round(value * 100)}<span style={{ fontSize: size * .1, color: "var(--z500)", fontStyle: "normal" }}>%</span>
      </div>
    </div>
  );
}

/* ─── HERO CARD ─────────────────────────────────────────────── */
function HeroCard({ p }) {
  const totalKills = p.weapons.reduce((s, w) => s + w.kills, 0);
  return (
    <Fade>
      <div className="card ticks" style={{
        padding: 40, display: "grid",
        gridTemplateColumns: "1fr auto", alignItems: "flex-end", gap: 32, marginBottom: 16,
      }}>
        <div style={{ display: "flex", flexDirection: "column", gap: 18 }}>

            <span className="cap cap-xs" style={{ color: "var(--z700)" }}>{p.tournament}</span>
          </div>
          <h1 className="h1 num" style={{ fontSize: "clamp(52px,7.5vw,104px)" }}>{p.name}</h1>
          <div style={{ display: "flex", gap: 28, flexWrap: "wrap" }}>
            {[["COUNTRY", p.country], ["MAPS_PLAYED", String(p.maps)], ["TOTAL_KILLS", String(totalKills)], ["NODE", p.node]].map(([k, v]) => (
              <div key={k}>
                <div className="cap cap-xs" style={{ display: "block", marginBottom: 5 }}>{k}</div>
                <div className="num" style={{ fontSize: 13, color: k === "NODE" ? "var(--z500)" : "#fff" }}>{v}</div>
              </div>
            ))}
          </div>
        </div>
        <div style={{ textAlign: "right", display: "flex", flexDirection: "column", alignItems: "flex-end", gap: 14 }}>
          <div>
            <div className="cap cap-xs" style={{ display: "block", marginBottom: 8 }}>RATING_2.1</div>
            <div className="num" style={{ fontSize: "clamp(60px,6.5vw,90px)", lineHeight: 1, color: "var(--orange)" }}>
              {p.rating.toFixed(2)}
            </div>
          </div>
          <div style={{ display: "flex", alignItems: "center", gap: 12 }}>
            <span className="cap cap-xs" style={{ color: "var(--z600)" }}>#0{p.rank}&nbsp;OVERALL</span>
            <img src={`assets/rank${p.rankTier}.svg`} height="26" alt={"T" + p.rankTier} />
          </div>
        </div>
      </div>
    </Fade>
  );
}

/* ─── STAT STRIP ────────────────────────────────────────────── */
function StatStrip({ p }) {
  const stats = [
    { cap: "// RATING_2.1",  val: p.rating.toFixed(2), accent: "var(--orange)", pct: (p.rating - .5) / 1,   trend: "+0.12", up: true  },
    { cap: "// AVG_DMG_RND", val: p.adr.toFixed(1),    accent: null,            pct: p.adr / 130,            trend: "+21.1", up: true  },
    { cap: "// KAST",        val: p.kast + "%",         accent: null,            pct: p.kast / 100,           trend: "+6%",   up: true  },
    { cap: "// HEADSHOT%",   val: p.hs + "%",           accent: null,            pct: p.hs / 100,             trend: "−7%",   up: false },
    { cap: "// K/D_RATIO",   val: p.kd.toFixed(2),     accent: null,            pct: (p.kd - .5) / 1.2,     trend: "+0.21", up: true  },
  ];
  return (
    <Fade delay={80} style={{ marginBottom: 64 }}>
      <div style={{ display: "grid", gridTemplateColumns: "repeat(5,1fr)", border: "1px solid var(--z900)" }}>
        {stats.map((s, i) => (
          <div key={i} style={{ padding: "20px 20px 16px", borderRight: i < 4 ? "1px solid var(--z900)" : undefined }}>
            <span className="cap cap-xs">{s.cap}</span>
            <div className="num" style={{ fontSize: "clamp(26px,2.8vw,38px)", color: s.accent || "#fff", margin: "10px 0 8px" }}>
              {s.val}
            </div>
            <Bar value={s.pct} accent={s.accent || undefined} />
            <div style={{
              fontFamily: "var(--mono)", fontSize: 8, letterSpacing: ".08em", marginTop: 6,
              color: s.up ? "var(--green)" : "var(--red)",
            }}>
              {s.up ? "▲" : "▼"} {s.trend} vs avg
            </div>
          </div>
        ))}
      </div>
    </Fade>
  );
}

/* ─── CLUTCH + DUELS ────────────────────────────────────────── */
function ClutchSection({ p }) {
  const total = p.clutchW + p.clutchL;
  const winPct = Math.round(p.clutchW / total * 100);
  const [barW, setBarW] = useState(0);
  useEffect(() => {
    setBarW(0);
    const t = setTimeout(() => setBarW(p.clutchW / total * 100), 320);
    return () => clearTimeout(t);
  }, [p]);
  return (
    <div className="card" style={{ padding: 24, height: "100%", display: "flex", flexDirection: "column", gap: 22 }}>
      <span className="cap cap-xs">// CLUTCH_1vX</span>
      <div>
        <div style={{
          display: "flex", height: 40, border: "1px solid var(--z900)",
          overflow: "hidden", marginBottom: 8,
        }}>
          <div style={{
            width: barW + "%", background: "#fff", color: "#000",
            display: "flex", alignItems: "center", padding: "0 14px",
            fontWeight: 900, fontStyle: "italic", fontSize: 14, whiteSpace: "nowrap",
            transition: "width 1.2s cubic-bezier(0,.6,.3,1)",
          }}>WON {p.clutchW}</div>
          <div style={{
            flex: 1, background: "var(--z900)", color: "var(--z500)",
            display: "flex", alignItems: "center", justifyContent: "flex-end",
            padding: "0 14px", fontWeight: 900, fontStyle: "italic", fontSize: 14, whiteSpace: "nowrap",
          }}>{p.clutchL} LOST</div>
        </div>
        <div style={{
          display: "flex", justifyContent: "space-between",
          fontFamily: "var(--mono)", fontSize: 9, letterSpacing: ".12em", textTransform: "uppercase",
        }}>
          <span style={{ color: "var(--green)" }}>WIN_RATE {winPct}%</span>
          <span style={{ color: "var(--z500)" }}>TOTAL {total}</span>
        </div>
      </div>
      <div>
        <span className="cap cap-xs" style={{ display: "block", marginBottom: 12 }}>// OPENING_DUELS</span>
        <div style={{ display: "flex", alignItems: "center", gap: 14, marginBottom: 8 }}>
          <div className="num" style={{ fontSize: 32, color: "var(--orange)", lineHeight: 1, minWidth: 64 }}>
            {Math.round(p.entry * 100)}<span style={{ fontSize: 14, color: "var(--z500)", fontStyle: "normal" }}>%</span>
          </div>
          <div style={{ flex: 1 }}><Bar value={p.entry} accent="var(--orange)" /></div>
        </div>
        <div style={{
          display: "flex", justifyContent: "space-between",
          fontFamily: "var(--mono)", fontSize: 9, letterSpacing: ".12em",
          textTransform: "uppercase", color: "var(--z500)",
        }}>
          <span>SUCCESS_RATE</span><span>AVG 44%</span>
        </div>
      </div>
    </div>
  );
}

/* ─── MAP PERFORMANCE ───────────────────────────────────────── */
function MapSection({ maps }) {
  return (
    <Fade delay={140} style={{ marginBottom: 64 }}>
      <div style={{ display: "flex", alignItems: "center", gap: 16, marginBottom: 10 }}>
        <span className="cap cap-xs">// MAP_PERFORMANCE</span>
        <div className="zebra" style={{ flex: 1 }} />
      </div>
      <div style={{ display: "grid", gridTemplateColumns: "repeat(5,1fr)", gap: 8 }}>
        {maps.map((m, i) => {
          const tot = m.w + m.l;
          const pct = Math.round(m.w / tot * 100);
          return (
            <Fade key={m.name} delay={i * 60}>
              <div className="card inv" style={{ padding: 18 }}>
                <div className="wipe" />
                <span className="cap cap-xs" style={{ display: "block", marginBottom: 10 }}>{m.name}</span>
                <div className="num" style={{ fontSize: 30, marginBottom: 8 }}>
                  {pct}<span style={{ fontSize: 12, color: "var(--z500)", fontStyle: "normal" }}>%</span>
                </div>
                <div className="bt"><div className="bf" style={{ width: pct + "%" }} /></div>
                <div style={{
                  display: "flex", justifyContent: "space-between", marginTop: 8,
                  fontFamily: "var(--mono)", fontSize: 8, textTransform: "uppercase", letterSpacing: ".1em",
                }}>
                  <span className="sub">{m.w}W / {m.l}L</span>
                  <span className="sub">RTG {m.rating.toFixed(2)}</span>
                </div>
              </div>
            </Fade>
          );
        })}
      </div>
    </Fade>
  );
}

/* ─── WEAPON LOADOUT ────────────────────────────────────────── */
function WeaponSection({ weapons }) {
  const maxK = Math.max(...weapons.map(w => w.kills));
  return (
    <Fade delay={160} style={{ marginBottom: 64 }}>
      <div style={{ display: "flex", alignItems: "center", gap: 16, marginBottom: 10 }}>
        <span className="cap cap-xs">// WEAPON_LOADOUT</span>
        <div className="zebra" style={{ flex: 1 }} />
      </div>
      <div className="card" style={{ padding: "0 24px" }}>
        {weapons.map((w, i) => (
          <div key={w.name} style={{
            display: "flex", alignItems: "center", gap: 20, padding: "16px 0",
            borderBottom: i < weapons.length - 1 ? "1px solid var(--z900)" : undefined,
          }}>
            <div style={{ flex: 1 }}>
              <span className="cap cap-xs" style={{ display: "block", marginBottom: 7 }}>{w.name}</span>
              <Bar value={w.kills / maxK} />
            </div>
            {[["K", String(w.kills), "#fff"], ["ADR", w.adr.toFixed(1), "var(--z400)"], ["HS%", String(w.hs), "var(--z500)"]].map(([lbl, val, col]) => (
              <div key={lbl} style={{ textAlign: "right", minWidth: 40 }}>
                <div className="cap" style={{ fontSize: 7, letterSpacing: ".2em", marginBottom: 4 }}>{lbl}</div>
                <div className="num" style={{ fontSize: 20, color: col }}>{val}</div>
              </div>
            ))}
          </div>
        ))}
      </div>
    </Fade>
  );
}

/* ─── MATCH HISTORY ─────────────────────────────────────────── */
function MatchHistory({ matches }) {
  const COLS = "120px 100px 60px 80px 72px 64px 48px 48px 56px";
  const HEADS = ["MAP", "OPPONENT", "SCORE", "RATING", "ADR", "KAST", "K", "D", "HS%"];
  return (
    <Fade delay={200} style={{ marginBottom: 64 }}>
      <div style={{ display: "flex", alignItems: "center", gap: 16, marginBottom: 10 }}>
        <span className="cap cap-xs">// MATCH_HISTORY</span>
        <div className="zebra" style={{ flex: 1 }} />
      </div>
      {/* header row */}
      <div style={{
        display: "grid", gridTemplateColumns: COLS, padding: "8px 20px",
        border: "1px solid var(--z900)", borderBottom: "none",
        background: "rgba(24,24,27,.07)",
      }}>
        {HEADS.map(h => (
          <div key={h} style={{
            padding: "0 8px", fontFamily: "var(--mono)", fontSize: 8,
            letterSpacing: ".25em", textTransform: "uppercase", color: "var(--z600)",
          }}>{h}</div>
        ))}
      </div>
      {matches.map((m, i) => (
        <Fade key={i} delay={i * 55}>
          <div className="inv" style={{
            display: "grid", gridTemplateColumns: COLS,
            padding: "0 20px", border: "1px solid var(--z900)",
            borderTop: "none", minHeight: 52, alignItems: "center",
          }}>
            <div className="wipe" />
            {/* rank ghost */}
            <div className="num ghost-num" style={{
              position: "absolute", left: 8, fontSize: 40,
              color: "var(--z900)", transition: "color .3s", pointerEvents: "none",
            }}>{String(i + 1).padStart(2, "0")}</div>
            <div style={{ padding: "0 8px", fontWeight: 900, fontStyle: "italic", fontSize: 13, letterSpacing: "-.03em" }}>
              {m.map}
            </div>
            <div style={{ padding: "0 8px" }}>
              <span className="sub" style={{ fontFamily: "var(--mono)", fontSize: 9, letterSpacing: ".08em", textTransform: "uppercase" }}>
                vs {m.opp}
              </span>
            </div>
            <div style={{ padding: "0 8px" }}>
              <span className="num" style={{ fontSize: 14, color: m.win ? "#fff" : "var(--z500)" }}>{m.score}</span>
            </div>
            <div style={{ padding: "0 8px" }}>
              <span className="num" style={{ fontSize: 16, color: m.rating >= 1.3 ? "var(--orange)" : "#fff" }}>
                {m.rating.toFixed(2)}
              </span>
            </div>
            <div style={{ padding: "0 8px" }}>
              <span className="num sub" style={{ fontSize: 14 }}>{m.adr.toFixed(1)}</span>
            </div>
            <div style={{ padding: "0 8px" }}>
              <span className="num sub" style={{ fontSize: 14 }}>{m.kast}%</span>
            </div>
            <div style={{ padding: "0 8px" }}>
              <span className="num" style={{ fontSize: 16 }}>{m.k}</span>
            </div>
            <div style={{ padding: "0 8px" }}>
              <span className="num sub" style={{ fontSize: 14 }}>{m.d}</span>
            </div>
            <div style={{ padding: "0 8px" }}>
              <span className="num sub" style={{ fontSize: 14 }}>{m.hs}%</span>
            </div>
          </div>
        </Fade>
      ))}
    </Fade>
  );
}

/* ─── MAIN PAGE ─────────────────────────────────────────────── */
function PlayerPage() {
  const [player, setPlayer] = useState(PLAYERS[0]);
  const [ver, setVer] = useState(0);

  function pick(p) { setPlayer(p); setVer(v => v + 1); }
  const v = ver;

  return (
    <div style={{ background: "var(--page)", minHeight: "100vh", position: "relative" }}>
      <div className="dotgrid" />
      <Navbar />

      <div className="page">
        {/* Watermark */}
        <div className="wm" style={{ top: "5vh", right: "-2vw", fontSize: "22vw" }}>
          {player.name.slice(0, 4).toUpperCase()}
        </div>
        {/* Second watermark – match section anchor */}
        <div className="wm" style={{ bottom: "6vh", left: "-1vw", fontSize: "10vw", opacity: .6 }}>
          HIST.EXE
        </div>

        <div className="container">

          {/* ── PAGE HEADER ── */}
          <Fade key={"hd" + v}>
            <header className="pagehead">
              <div className="tagrow">
                <span className="cap cap-xs" style={{ color: "var(--z600)" }}>DATA_EXTRACT // PLAYER_PROFILE</span>
                <div style={{ height: 1, width: 96, background: "var(--z800)" }} />
                <span className="cap cap-xs" style={{ color: "var(--z700)" }}>{player.node}</span>
              </div>
              <div className="h1 num" style={{ fontSize: "clamp(52px,9vw,116px)" }}>
                {player.name}
                <span style={{ color: "var(--z800)", marginLeft: 14 }}>[#0{player.rank}]</span>
              </div>
            </header>
          </Fade>

          {/* ── PLAYER SELECTOR ── */}
          <PlayerSelector current={player} onSelect={pick} />

          {/* ── HERO CARD ── */}
          <HeroCard key={"hero" + v} p={player} />

          <div style={{ height: 16 }} />

          {/* ── STAT STRIP ── */}
          <StatStrip key={"ss" + v} p={player} />

          {/* ── CLUTCH + ENTRY GAUGE ── */}
          <div key={"pg" + v} style={{ display: "grid", gridTemplateColumns: "repeat(12,1fr)", gap: 16, marginBottom: 64 }}>
            <div style={{ gridColumn: "span 8" }}>
              <ClutchSection p={player} />
            </div>
            <div style={{ gridColumn: "span 4" }}>
              <div className="card" style={{
                padding: 24, height: "100%", display: "flex",
                flexDirection: "column", alignItems: "center", justifyContent: "center", gap: 20,
              }}>
                <span className="cap cap-xs" style={{ alignSelf: "flex-start" }}>// ENTRY_SUCCESS</span>
                <Gauge key={"g" + v} value={player.entry} size={140} />
                <span className="cap cap-xs" style={{ color: "var(--z600)" }}>OPENING_KILL_RATE</span>
              </div>
            </div>
          </div>

          {/* ── MAP PERFORMANCE ── */}
          <MapSection key={"mp" + v} maps={player.mapStats} />

          {/* ── WEAPON LOADOUT ── */}
          <WeaponSection key={"wl" + v} weapons={player.weapons} />

          {/* ── MATCH HISTORY ── */}
          <MatchHistory key={"mh" + v} matches={player.matchHistory} />

          {/* ── FOOTER ── */}
          <div style={{
            borderTop: "1px solid var(--z900)", paddingTop: 24,
            display: "flex", justifyContent: "space-between", alignItems: "center",
          }}>
            <span className="cap cap-xs" style={{ color: "var(--z700)" }}>CS2_PARSER // PLAYER_STATS_MODULE</span>
            <span className="cap cap-xs" style={{ color: "var(--z700)" }}>NET_LINK_ESTABLISHED // NODE_01</span>
          </div>

        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<PlayerPage />);
</script>
</body>
</html>
