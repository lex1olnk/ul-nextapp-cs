<!DOCTYPE html><html lang="en"><head><meta charset="utf-8">
<link rel="preconnect" href="https://fonts.googleapis.com"><link href="https://fonts.googleapis.com/css2?family=Nunito:ital,wght@0,700;0,900&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#0a0a0a;color:#fff;font-family:"Nunito",sans-serif;width:700px;padding:26px}
.meta{font-family:ui-monospace,Menlo,monospace;font-size:8px;letter-spacing:.2em;text-transform:uppercase;color:#52525b;margin:0 0 10px}
.row{display:flex;gap:12px;align-items:center;flex-wrap:wrap;margin-bottom:20px}
.chip{background:#fff;color:#000;padding:3px 9px;font-size:10px;font-weight:900;text-transform:uppercase;letter-spacing:.04em}
.badge{background:#27272a;color:#fff;padding:2px 7px;font-size:8px;font-weight:700;font-style:italic;text-transform:uppercase}
.badge.top{background:#000;border:1px solid #27272a}
.mono{font-family:ui-monospace,Menlo,monospace}
.st{font-family:ui-monospace,Menlo,monospace;font-size:11px;font-weight:700;letter-spacing:.15em}
</style></head><body>
<p class="meta">CHIPS</p>
<div class="row">
  <span class="chip">Tournament_Standings</span>
  <span class="badge">TOP 0.1%</span>
  <span class="badge top">TOP 5%</span>
</div>
<p class="meta">STATUS CODES · bracketed mono</p>
<div class="row" style="margin-bottom:0">
  <span class="st" style="color:#22c55e">[ ONGOING ]</span>
  <span class="st" style="color:#facc15">[ STANDBY ]</span>
  <span class="st" style="color:#71717a">[ ENDED ]</span>
  <span class="st" style="color:#f97316">[ LIVE ]</span>
</div>
</body></html>
