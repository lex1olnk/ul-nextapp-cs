<!DOCTYPE html><html lang="en"><head><meta charset="utf-8">
<link rel="preconnect" href="https://fonts.googleapis.com"><link href="https://fonts.googleapis.com/css2?family=Nunito:ital,wght@0,700;0,900&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#0a0a0a;color:#fff;font-family:"Nunito",sans-serif;width:700px;padding:26px;display:flex;align-items:center;gap:32px}
.cap{font-family:ui-monospace,Menlo,monospace;font-size:9px;letter-spacing:.3em;text-transform:uppercase;color:#52525b;display:block;margin-bottom:10px}
.lock{display:flex;align-items:center;gap:14px}
.brand{font-weight:900;font-style:italic;letter-spacing:-.05em;text-transform:uppercase;font-size:30px}
.ghost{color:#27272a}
.box{border:1px solid #18181b;padding:18px;display:flex;align-items:center;justify-content:center}
.box.inv{background:#fff}
</style></head><body>
<div>
  <span class="cap">// LOGO_MARK</span>
  <div style="display:flex;gap:10px">
    <div class="box"><img src="../assets/logo.png" width="72" height="72" alt="UL"></div>
    <div class="box inv"><img src="../assets/logo.png" width="72" height="72" alt="UL" style="filter:invert(1)"></div>
  </div>
</div>
<div>
  <span class="cap">// LOCKUP</span>
  <div class="lock"><img src="../assets/logo.png" width="40" height="40" alt="UL"><span class="brand">CS2_<span class="ghost">PARSER</span></span></div>
  <span class="cap" style="margin-top:18px">Hexagonal UL monogram · white on dark · invert on light</span>
</div>
</body></html>
