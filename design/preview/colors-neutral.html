<!DOCTYPE html><html lang="en"><head><meta charset="utf-8">
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Nunito:ital,wght@0,700;0,900&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#0a0a0a;color:#fff;font-family:"Nunito",sans-serif;width:700px;padding:22px}
.mono{font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace}
.row{display:flex;gap:0;border:1px solid #18181b}
.sw{flex:1;height:78px;display:flex;flex-direction:column;justify-content:flex-end;padding:8px}
.name{font-size:9px;letter-spacing:.18em;text-transform:uppercase;font-weight:700}
.hex{font-size:9px;letter-spacing:.05em;opacity:.7;margin-top:2px}
</style></head><body>
<div class="row">
  <div class="sw" style="background:#0a0a0a;border-right:1px solid #27272a"><span class="name">Page</span><span class="hex mono">#0a0a0a</span></div>
  <div class="sw" style="background:#0c0c0c"><span class="name">Body</span><span class="hex mono">#0c0c0c</span></div>
  <div class="sw" style="background:#18181b"><span class="name">900</span><span class="hex mono">#18181b</span></div>
  <div class="sw" style="background:#27272a"><span class="name">800</span><span class="hex mono">#27272a</span></div>
  <div class="sw" style="background:#3f3f46"><span class="name">700</span><span class="hex mono">#3f3f46</span></div>
  <div class="sw" style="background:#52525b"><span class="name">600</span><span class="hex mono">#52525b</span></div>
  <div class="sw" style="background:#71717a"><span class="name">500</span><span class="hex mono">#71717a</span></div>
  <div class="sw" style="background:#a1a1aa;color:#000"><span class="name">400</span><span class="hex mono">#a1a1aa</span></div>
  <div class="sw" style="background:#e4e4e7;color:#000"><span class="name">200</span><span class="hex mono">#e4e4e7</span></div>
  <div class="sw" style="background:#fff;color:#000"><span class="name">White</span><span class="hex mono">#ffffff</span></div>
</div>
</body></html>
