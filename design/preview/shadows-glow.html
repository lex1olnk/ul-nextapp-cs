<!DOCTYPE html><html lang="en"><head><meta charset="utf-8">
<link rel="preconnect" href="https://fonts.googleapis.com"><link href="https://fonts.googleapis.com/css2?family=Nunito:ital,wght@0,700;0,900&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#0a0a0a;color:#fff;font-family:"Nunito",sans-serif;width:700px;padding:28px;display:flex;gap:22px;align-items:center}
.box{flex:1;text-align:center}
.meta{font-family:ui-monospace,Menlo,monospace;font-size:8px;letter-spacing:.18em;text-transform:uppercase;color:#52525b;margin-top:16px;display:block}
.flat{height:60px;border:1px solid #18181b;background:rgba(24,24,27,.1);display:flex;align-items:center;justify-content:center}
.glow{height:60px;background:#fff;color:#000;display:flex;align-items:center;justify-content:center;box-shadow:0 0 20px rgba(255,255,255,.4);font-weight:900;font-style:italic;text-transform:uppercase;font-size:13px}
.drama{height:60px;background:#0c0c0c;border:1px solid #27272a;display:flex;align-items:center;justify-content:center;box-shadow:30px 30px 60px rgba(0,0,0,.5);color:#a1a1aa;font-size:11px}
.x{color:#3f3f46;font-size:20px}
</style></head><body>
<div class="box"><div class="flat"><span class="x">✕ none</span></div><span class="meta">DEFAULT — contrast, not elevation</span></div>
<div class="box"><div class="glow">GLOW</div><span class="meta">0 0 20px rgba(255,255,255,.4)</span></div>
<div class="box"><div class="drama">CINEMATIC BLOCK</div><span class="meta">30px 30px 60px rgba(0,0,0,.5)</span></div>
</body></html>
