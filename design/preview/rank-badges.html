<!DOCTYPE html><html lang="en"><head><meta charset="utf-8">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#0a0a0a;color:#fff;font-family:ui-monospace,Menlo,monospace;width:700px;padding:26px}
.cap{font-size:9px;letter-spacing:.4em;text-transform:uppercase;color:#52525b;margin-bottom:16px;display:block}
.row{display:flex;align-items:flex-end;gap:22px}
.cell{display:flex;flex-direction:column;align-items:center;gap:10px}
.cell img{height:40px;width:auto;display:block}
.lab{font-size:8px;letter-spacing:.2em;text-transform:uppercase;color:#71717a}
.arrow{flex:1;height:1px;background:linear-gradient(90deg,#A83131,#EBA100,#EDF500,#00F552,#00F5E9);margin-bottom:24px;opacity:.5}
</style></head><body>
<span class="cap">// RANK_TIERS — LOW → HIGH</span>
<div class="row">
  <div class="cell"><img src="../assets/rank1.svg" alt="T1"><span class="lab">Red</span></div>
  <div class="cell"><img src="../assets/rank2.svg" alt="T2"><span class="lab">Amber</span></div>
  <div class="cell"><img src="../assets/rank3.svg" alt="T3"><span class="lab">Yellow</span></div>
  <div class="cell"><img src="../assets/rank4.svg" alt="T4"><span class="lab">Green</span></div>
  <div class="cell"><img src="../assets/rank5.svg" alt="T5"><span class="lab">Cyan</span></div>
</div>
<div style="margin-top:18px;font-size:8px;letter-spacing:.15em;color:#52525b;text-transform:uppercase">Angular tab · cut corner · diagonal stripes (count = tier) · red · amber · yellow · green · cyan</div>
</body></html>
