<!DOCTYPE html><html lang="en"><head><meta charset="utf-8">
<link rel="preconnect" href="https://fonts.googleapis.com"><link href="https://fonts.googleapis.com/css2?family=Nunito:ital,wght@0,400;0,900&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#0a0a0a;color:#fff;font-family:"Nunito",sans-serif;width:700px;padding:26px}
.cap{font-family:ui-monospace,Menlo,monospace;font-size:9px;letter-spacing:.4em;text-transform:uppercase;color:#52525b;margin-bottom:14px;display:block}
.mark{font-weight:900;font-style:italic;text-transform:uppercase;letter-spacing:-.05em;font-size:46px;line-height:.9}
.ghost{color:#27272a}
.sub{font-family:ui-monospace,Menlo,monospace;font-size:9px;letter-spacing:.3em;text-transform:uppercase;color:#71717a;margin-top:6px}
.alt span:nth-child(even){color:#27272a}
.alt{font-weight:900;font-style:italic;text-transform:uppercase;letter-spacing:-.04em;font-size:26px;margin-top:20px}
</style></head><body>
<span class="cap">// WORDMARK — TYPESET, NO LOGOTYPE</span>
<div class="mark">CS2_<span class="ghost">PARSER</span></div>
<div class="sub">DATA_EXTRACT // TOURNAMENT_STATS</div>
<div class="alt"><span>Team</span><span>_</span><span>Assembly</span><span>_</span><span>Stats</span></div>
</body></html>
