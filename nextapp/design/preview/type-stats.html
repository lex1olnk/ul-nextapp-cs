<!DOCTYPE html><html lang="en"><head><meta charset="utf-8">
<link href="https://fonts.googleapis.com/css2?family=Nunito:ital,wght@0,400;0,700;0,900&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#0a0a0a;color:#fff;font-family:"Nunito",sans-serif;width:700px;padding:20px}
.mono{font-family:ui-monospace,Menlo,monospace}
.cap{font-family:ui-monospace,Menlo,monospace;font-size:8px;letter-spacing:.22em;text-transform:uppercase;color:#52525b}
.num{font-weight:900;font-style:italic;letter-spacing:-.05em;font-variant-numeric:tabular-nums;line-height:1}
.grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:10px}
.cell{border:1px solid #18181b;background:rgba(24,24,27,.06);padding:12px}
.bar-track{height:2px;background:#18181b;overflow:hidden;margin-top:6px}
.bar-fill{height:100%}
.dim{color:#27272a}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.big-cell{border:1px solid #18181b;background:rgba(24,24,27,.06);padding:14px;display:flex;align-items:center;gap:18px}
.trend{font-family:ui-monospace,Menlo,monospace;font-size:9px;color:#22c55e;letter-spacing:.1em;margin-top:4px}
.trend.neg{color:#ef4444}
.rank-col{display:flex;flex-direction:column;align-items:center;border-right:1px solid #18181b;padding-right:14px;margin-right:4px}
</style></head><body>

<!-- row 1: four core stat tiles -->
<div class="grid">
  <div class="cell">
    <span class="cap">// RATING</span>
    <div class="num" style="font-size:36px;margin-top:8px">1.34</div>
    <div class="trend">▲ +0.12 vs avg</div>
    <div class="bar-track"><div class="bar-fill" style="width:94%;background:#f97316"></div></div>
  </div>
  <div class="cell">
    <span class="cap">// ADR</span>
    <div class="num" style="font-size:36px;margin-top:8px">92.1</div>
    <div class="trend">▲ +21.1 vs avg</div>
    <div class="bar-track"><div class="bar-fill" style="width:82%;background:#fff"></div></div>
  </div>
  <div class="cell">
    <span class="cap">// KAST</span>
    <div class="num" style="font-size:36px;margin-top:8px">76<span style="font-size:14px;color:#71717a">%</span></div>
    <div class="trend">▲ +6% vs avg</div>
    <div class="bar-track"><div class="bar-fill" style="width:76%;background:#fff"></div></div>
  </div>
  <div class="cell">
    <span class="cap">// HS%</span>
    <div class="num" style="font-size:36px;margin-top:8px">51<span style="font-size:14px;color:#71717a">%</span></div>
    <div class="trend neg">▼ -7% vs avg</div>
    <div class="bar-track"><div class="bar-fill" style="width:51%;background:#3f3f46"></div></div>
  </div>
</div>

<!-- row 2: rank num + team -->
<div class="row2">
  <div class="big-cell">
    <div class="rank-col">
      <span class="cap" style="margin-bottom:4px">RANK</span>
      <span class="num dim" style="font-size:52px">01</span>
    </div>
    <div>
      <span class="cap" style="display:block;margin-bottom:4px">PLAYER</span>
      <div style="font-size:22px;font-weight:900;font-style:italic;letter-spacing:-.04em;text-transform:uppercase">ZywOo</div>
      <div style="font-family:ui-monospace,Menlo,monospace;font-size:10px;color:#52525b;margin-top:3px">TEAM VITALITY</div>
    </div>
  </div>
  <div class="big-cell" style="flex-direction:column;align-items:flex-start">
    <span class="cap" style="margin-bottom:8px">// MAP_RATING_SCALE</span>
    <div style="display:flex;gap:4px;align-items:flex-end;height:32px;width:100%">
      <div style="flex:1;background:#3f3f46;height:40%"></div>
      <div style="flex:1;background:#52525b;height:55%"></div>
      <div style="flex:1;background:#71717a;height:70%"></div>
      <div style="flex:1;background:#a1a1aa;height:82%"></div>
      <div style="flex:1;background:#f97316;height:100%"></div>
      <div style="flex:1;background:#a1a1aa;height:78%"></div>
      <div style="flex:1;background:#71717a;height:64%"></div>
      <div style="flex:1;background:#52525b;height:48%"></div>
    </div>
    <div style="font-family:ui-monospace,Menlo,monospace;font-size:8px;color:#3f3f46;margin-top:4px;letter-spacing:.1em">MIRAGE · INFERNO · NUKE · ANCIENT · ANUBIS · DUST2 · TRAIN · VERTIGO</div>
  </div>
</div>

</body></html>
