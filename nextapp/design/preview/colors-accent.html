<!DOCTYPE html><html lang="en"><head><meta charset="utf-8">
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Nunito:ital,wght@0,700;0,900&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#0a0a0a;color:#fff;font-family:"Nunito",sans-serif;width:700px;padding:22px}
.mono{font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace}
.cap{font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;font-size:9px;letter-spacing:.4em;text-transform:uppercase;color:#71717a;font-weight:700;margin-bottom:12px}
.grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}
.sw{height:64px;border:1px solid #18181b;display:flex;flex-direction:column;justify-content:flex-end;padding:7px}
.name{font-size:9px;letter-spacing:.16em;text-transform:uppercase;font-weight:700}
.hex{font-size:9px;opacity:.85;margin-top:2px}
.rot{display:flex;gap:6px;margin-top:14px}
.dot{flex:1;height:24px;border:1px solid rgba(255,255,255,.1)}
</style></head><body>
<div class="cap">// ACCENTS_ONLY — STATUS / PROGRESS / FX</div>
<div class="grid">
  <div class="sw" style="background:#fb923c;color:#000"><span class="name">Orange 400</span><span class="hex mono">#fb923c</span></div>
  <div class="sw" style="background:#f97316;color:#000"><span class="name">Orange 500</span><span class="hex mono">#f97316</span></div>
  <div class="sw" style="background:#c2410c"><span class="name">Orange 700</span><span class="hex mono">#c2410c</span></div>
  <div class="sw" style="background:#0a0a0a;border-color:#27272a"><span class="name" style="color:#22c55e">[ ONGOING ]</span><span class="hex mono" style="color:#22c55e">#22c55e</span></div>
  <div class="sw" style="background:#22c55e;color:#000"><span class="name">Green 500</span><span class="hex mono">#22c55e</span></div>
  <div class="sw" style="background:#facc15;color:#000"><span class="name">Yellow 400</span><span class="hex mono">#facc15</span></div>
</div>
<div class="cap" style="margin-top:18px">// DUELMASTERS_ROTATION — ISOLATED WIDGET</div>
<div class="rot">
  <div class="dot" style="background:#ef4444"></div>
  <div class="dot" style="background:#facc15"></div>
  <div class="dot" style="background:#4ade80"></div>
  <div class="dot" style="background:#22d3ee"></div>
  <div class="dot" style="background:#3b82f6"></div>
</div>
</body></html>
