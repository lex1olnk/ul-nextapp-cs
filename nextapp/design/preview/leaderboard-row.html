<!DOCTYPE html><html lang="en"><head><meta charset="utf-8">
<link href="https://fonts.googleapis.com/css2?family=Nunito:ital,wght@0,400;0,700;0,900&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#0a0a0a;font-family:"Nunito",sans-serif;width:700px;padding:20px;color:#fff}
.mono{font-family:ui-monospace,Menlo,monospace}

/* section tag */
.stag{font-family:ui-monospace,Menlo,monospace;font-size:8px;letter-spacing:.3em;text-transform:uppercase;color:#3f3f46;margin-bottom:12px;display:block}

/* ── entry ── */
.entry{position:relative;border-bottom:1px solid #18181b;overflow:hidden;cursor:pointer;transition:background .25s,color .25s}
.entry:hover{background:#fff;color:#000}
.entry-body{display:flex;align-items:center;gap:0;padding:12px 0}

/* rank: big ghost italic number */
.rank{font-size:36px;font-weight:900;font-style:italic;letter-spacing:-.06em;color:#1e1e23;line-height:1;
  min-width:58px;text-align:right;padding-right:16px;transition:color .25s;flex-shrink:0}
.entry:hover .rank{color:rgba(0,0,0,.1)}

/* player info */
.info{flex:1;min-width:0}
.name{font-size:17px;font-weight:900;font-style:italic;letter-spacing:-.04em;text-transform:uppercase;line-height:1;transition:color .25s}
.meta{font-family:ui-monospace,Menlo,monospace;font-size:9px;letter-spacing:.08em;text-transform:uppercase;
  color:#52525b;margin-top:3px;transition:color .25s;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.entry:hover .meta{color:rgba(0,0,0,.45)}

/* rating */
.rat{font-size:22px;font-weight:900;font-style:italic;letter-spacing:-.05em;padding:0 16px;flex-shrink:0;transition:color .25s}

/* full-width bar — sits at bottom of each entry */
.bar-row{height:2px;overflow:hidden}
.bar-bg{height:100%;background:#18181b;transition:background .25s}
.bar-fill{height:100%;background:#3f3f46;transition:background .25s, width .8s cubic-bezier(.4,0,.2,1)}
.entry:hover .bar-bg{background:rgba(0,0,0,.12)}
.entry:hover .bar-fill{background:#000}

/* left-edge wipe */
.wipe{position:absolute;left:0;top:0;bottom:0;width:2px;background:#fff;transform:scaleY(0);transform-origin:top;transition:transform .25s}
.entry:hover .wipe{transform:scaleY(1);background:#000}
</style></head><body>

<span class="stag">// PLAYERS_STAT — hover any row</span>

<div class="entry">
  <div class="wipe"></div>
  <div class="entry-body">
    <span class="rank">01</span>
    <div class="info">
      <div class="name">ZywOo</div>
      <div class="meta">VITALITY &nbsp;·&nbsp; ADR 92.1 &nbsp;·&nbsp; KAST 76% &nbsp;·&nbsp; HS 51%</div>
    </div>
    <div class="rat">1.34</div>
  </div>
  <div class="bar-row"><div class="bar-bg" style="width:100%"><div class="bar-fill" style="width:96%"></div></div></div>
</div>

<div class="entry">
  <div class="wipe"></div>
  <div class="entry-body">
    <span class="rank">02</span>
    <div class="info">
      <div class="name">donk</div>
      <div class="meta">SPIRIT &nbsp;·&nbsp; ADR 95.7 &nbsp;·&nbsp; KAST 74% &nbsp;·&nbsp; HS 58%</div>
    </div>
    <div class="rat">1.31</div>
  </div>
  <div class="bar-row"><div class="bar-bg" style="width:100%"><div class="bar-fill" style="width:90%"></div></div></div>
</div>

<div class="entry">
  <div class="wipe"></div>
  <div class="entry-body">
    <span class="rank">03</span>
    <div class="info">
      <div class="name">m0NESY</div>
      <div class="meta">G2 &nbsp;·&nbsp; ADR 84.0 &nbsp;·&nbsp; KAST 73% &nbsp;·&nbsp; HS 49%</div>
    </div>
    <div class="rat">1.22</div>
  </div>
  <div class="bar-row"><div class="bar-bg" style="width:100%"><div class="bar-fill" style="width:78%"></div></div></div>
</div>

<div class="entry">
  <div class="wipe"></div>
  <div class="entry-body">
    <span class="rank">04</span>
    <div class="info">
      <div class="name">ropz</div>
      <div class="meta">FAZE &nbsp;·&nbsp; ADR 80.4 &nbsp;·&nbsp; KAST 75% &nbsp;·&nbsp; HS 44%</div>
    </div>
    <div class="rat">1.18</div>
  </div>
  <div class="bar-row"><div class="bar-bg" style="width:100%"><div class="bar-fill" style="width:72%"></div></div></div>
</div>

</body></html>
