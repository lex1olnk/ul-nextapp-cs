<!DOCTYPE html><html lang="en"><head><meta charset="utf-8">
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Nunito:ital,wght@0,400;0,700;0,900&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#0a0a0a;font-family:"Nunito",sans-serif;width:700px;padding:24px}
.mono{font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace}
.line{display:flex;align-items:baseline;gap:14px;padding:9px 0;border-bottom:1px solid #18181b}
.t{font-weight:700}
.tag{font-family:ui-monospace,Menlo,monospace;font-size:9px;letter-spacing:.2em;text-transform:uppercase;margin-left:auto}
</style></head><body>
<div class="line"><span class="t" style="color:#fff;font-size:18px">Primary — fg1</span><span class="tag" style="color:#71717a">#FFFFFF</span></div>
<div class="line"><span class="t" style="color:#a1a1aa;font-size:18px">Secondary — fg2 / zinc-400</span><span class="tag" style="color:#71717a">#A1A1AA</span></div>
<div class="line"><span class="t mono" style="color:#71717a;font-size:13px;letter-spacing:.2em;text-transform:uppercase">Caption — fg3 / zinc-500</span><span class="tag" style="color:#71717a">#71717A</span></div>
<div class="line"><span class="t mono" style="color:#52525b;font-size:13px;letter-spacing:.2em;text-transform:uppercase">Deep meta — zinc-600</span><span class="tag" style="color:#52525b">#52525B</span></div>
<div class="line" style="border-bottom:none"><span class="t" style="color:#27272a;font-size:26px;font-style:italic;font-weight:900;text-transform:uppercase">Watermark / ghost</span><span class="tag" style="color:#3f3f46">ZINC-800</span></div>
</body></html>
