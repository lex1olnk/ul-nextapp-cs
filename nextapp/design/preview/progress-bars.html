<!DOCTYPE html><html lang="en"><head><meta charset="utf-8">
<link rel="preconnect" href="https://fonts.googleapis.com"><link href="https://fonts.googleapis.com/css2?family=Nunito:ital,wght@0,700;0,900&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#0a0a0a;color:#fff;font-family:"Nunito",sans-serif;width:700px;padding:24px}
.cap{font-family:ui-monospace,Menlo,monospace;font-size:9px;letter-spacing:.3em;text-transform:uppercase;color:#52525b;margin-bottom:8px;display:block}
.block{margin-bottom:20px}
.clutch{display:flex;height:34px;border:1px solid #18181b}
.win{background:#fff;color:#000;display:flex;align-items:center;padding:0 10px;font-weight:900;font-style:italic;font-size:13px}
.loss{background:#18181b;color:#71717a;display:flex;align-items:center;justify-content:flex-end;padding:0 10px;font-weight:900;font-style:italic;font-size:13px;flex:1}
.rate{display:flex;align-items:center;gap:12px}
.rate .num{font-size:22px;font-weight:900;font-style:italic}
.rbar{flex:1;height:6px;background:#18181b;overflow:hidden}
.rbar i{display:block;height:100%;background:#f97316}
</style></head><body>
<div class="block">
  <span class="cap">// CLUTCH_1vX — two-tone</span>
  <div class="clutch"><div class="win" style="width:64%">WON 16</div><div class="loss">9 LOST</div></div>
</div>
<div class="block" style="margin-bottom:0">
  <span class="cap">// RATING_PROGRESS — orange accent</span>
  <div class="rate"><span class="num">1.24</span><div class="rbar"><i style="width:82%"></i></div><span class="cap" style="margin:0">82%</span></div>
</div>
</body></html>
